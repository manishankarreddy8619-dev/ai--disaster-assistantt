<!DOCTYPE html>
<html>

<head>
    <title>AI Disaster Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🚨 AI Disaster Assistant</h1>

    <div class="input-box">
        <input id="location" placeholder="Enter location">
        
        <select id="disaster">
            <option>Flood</option>
            <option>Fire</option>
            <option>Earthquake</option>
            <option>Cyclone</option>
            <option>Landslide</option>
        </select>

        <button onclick="getHelp()">Get Help</button>
    </div>

    <div id="output" class="chat-box"></div>

</div>

<script src="script.js"></script>

</body>
</html>
